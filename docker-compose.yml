services:
  zcode-api:
    build: .
    container_name: zcode-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/root/.zcode-proxy
      # Place config.json on server: ssh root@server 'mkdir -p /root/.zcode/v2 && nano /root/.zcode/v2/config.json'
    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true
      - CAPTCHA_SDK_MODE=cdn
      - ZCODE_PROXY_CREDENTIAL_SECRET=C:\Users\yezi6-win32-x64
